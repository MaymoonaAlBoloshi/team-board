name: Sprint Burndown Report

on:
  schedule:
    # Runs every weekday at 9am UTC
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  burndown:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate burndown data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const VALID_POINTS = new Set([1, 2, 3, 5, 8, 13, 21]);

            // Read Story Points from project v2 single-select field via GraphQL
            const projectQuery = await github.graphql(`
              query {
                user(login: "${context.repo.owner}") {
                  projectV2(number: 3) {
                    items(first: 100) {
                      nodes {
                        content {
                          ... on Issue {
                            number
                            state
                            closedAt
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { ... on ProjectV2SingleSelectField { name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const items = projectQuery.user.projectV2.items.nodes;

            const getPoints = (item) => {
              const spField = item.fieldValues.nodes.find(
                f => f.field?.name === 'Story Points'
              );
              const val = parseInt(spField?.name || '0', 10);
              return VALID_POINTS.has(val) ? val : 0;
            };

            // Points burned per day (closed issues)
            const burned = {};
            let remaining = 0;

            for (const item of items) {
              const issue = item.content;
              if (!issue) continue;
              const pts = getPoints(item);
              if (issue.state === 'CLOSED' && issue.closedAt) {
                const date = issue.closedAt.slice(0, 10);
                burned[date] = (burned[date] || 0) + pts;
              } else {
                remaining += pts;
              }
            }

            const report = {
              generated_at: new Date().toISOString(),
              remaining_points: remaining,
              burned_by_date: burned,
            };

            fs.mkdirSync('.burndown', { recursive: true });
            fs.writeFileSync('.burndown/latest.json', JSON.stringify(report, null, 2));
            console.log('Burndown report:', JSON.stringify(report, null, 2));

      - name: Commit burndown data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .burndown/latest.json
          git diff --cached --quiet || git commit -m "chore: update burndown report [skip ci]"
          git push
