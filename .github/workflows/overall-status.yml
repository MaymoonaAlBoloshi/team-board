name: Overall Project Status Report

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate and post status report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch all issues (open + closed)
            const allIssues = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.issues.listForRepo({
                owner, repo, state: 'all', per_page: 100, page
              });
              if (!data.length) break;
              allIssues.push(...data.filter(i => !i.pull_request));
              if (data.length < 100) break;
              page++;
            }

            const VALID = new Set([1, 2, 3, 5, 8, 13, 21]);
            const pointMap = { '1 point':1,'2 points':2,'3 points':3,'5 points':5,'8 points':8,'13 points':13,'21 points':21 };

            const getPoints = (issue) => {
              for (const l of issue.labels) {
                const v = pointMap[l.name];
                if (v) return v;
              }
              return 0;
            };

            // Overall totals
            let totalOpen = 0, totalClosed = 0;
            const assigneeMap = {};
            const sprintMap = {};

            for (const issue of allIssues) {
              const pts = getPoints(issue);
              const sprint = issue.milestone?.title || 'Unscheduled';
              const isClosed = issue.state === 'closed';

              if (isClosed) totalClosed += pts;
              else totalOpen += pts;

              // Per sprint
              if (!sprintMap[sprint]) sprintMap[sprint] = { open: 0, closed: 0, total: 0 };
              if (isClosed) sprintMap[sprint].closed += pts;
              else sprintMap[sprint].open += pts;
              sprintMap[sprint].total += pts;

              // Per assignee
              const assignees = issue.assignees.length ? issue.assignees : [{ login: 'unassigned' }];
              for (const a of assignees) {
                if (!assigneeMap[a.login]) assigneeMap[a.login] = { open: 0, closed: 0 };
                if (isClosed) assigneeMap[a.login].closed += pts;
                else assigneeMap[a.login].open += pts;
              }
            }

            const total = totalOpen + totalClosed;
            const pct = total ? Math.round((totalClosed / total) * 100) : 0;
            const bar = '█'.repeat(Math.round(pct / 5)) + '░'.repeat(20 - Math.round(pct / 5));

            // Sprint table
            const sprintOrder = ['Sprint 1','Sprint 2','Sprint 3','Sprint 4','Sprint 5','Unscheduled'];
            const sprintRows = sprintOrder
              .filter(s => sprintMap[s])
              .map(s => {
                const { open, closed, total } = sprintMap[s];
                const p = total ? Math.round((closed / total) * 100) : 0;
                return `| ${s} | ${closed} | ${open} | ${total} | ${p}% |`;
              }).join('\n');

            // Assignee table
            const assigneeRows = Object.entries(assigneeMap)
              .sort((a, b) => (b[1].open + b[1].closed) - (a[1].open + a[1].closed))
              .map(([login, d]) => `| @${login} | ${d.closed} | ${d.open} | ${d.open + d.closed} |`)
              .join('\n');

            const now = new Date().toUTCString();
            const body = `## 📊 Overall Project Status
> Last updated: ${now} · [Refresh](https://github.com/${owner}/${repo}/actions/workflows/overall-status.yml)

### Progress
\`${bar}\` **${pct}%** complete
- ✅ **${totalClosed} pts** closed · 🔵 **${totalOpen} pts** open · 📦 **${total} pts** total

---

### By Sprint
| Sprint | ✅ Closed | 🔵 Open | Total | Progress |
|--------|-----------|---------|-------|----------|
${sprintRows}

---

### By Contributor
| Assignee | ✅ Closed | 🔵 Open | Total |
|----------|-----------|---------|-------|
${assigneeRows}

---
> Generated by [Overall Status workflow](https://github.com/${owner}/${repo}/actions/workflows/overall-status.yml)`;

            // Find existing status issue or create one
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status-report', per_page: 1
            });

            if (issues.length) {
              await github.rest.issues.update({
                owner, repo, issue_number: issues[0].number, body
              });
              console.log(`Updated status issue #${issues[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title: '📊 Project Status (auto-updated)',
                body,
                labels: ['status-report']
              });
              // Pin it
              console.log(`Created status issue #${created.number}`);
            }
