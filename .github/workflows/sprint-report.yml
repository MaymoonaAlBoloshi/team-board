name: Sprint Report

on:
  issues:
    types: [labeled]

jobs:
  sprint-report:
    if: github.event.label.name == 'sprint-report'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate sprint report
        uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const body = context.payload.issue.body || '';

            const sprintMatch = body.match(/###\s*Sprint\s*\n+(.+)/);
            const sprint = sprintMatch ? sprintMatch[1].trim() : null;

            if (!sprint || sprint === '_No response_') {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: 'Could not parse sprint name. Please use the issue template.'
              });
              return;
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: 'Generating report for **' + sprint + '**...'
            });

            const { data: milestones } = await github.rest.issues.listMilestones({ owner, repo });
            const milestone = milestones.find(m => m.title === sprint);

            if (!milestone) {
              const names = milestones.map(m => m.title).join(', ');
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: 'Milestone **' + sprint + '** not found. Valid sprints: ' + names
              });
              await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'closed' });
              return;
            }

            // Fetch issues for this milestone
            const allIssues = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.issues.listForRepo({
                owner, repo, state: 'all', milestone: milestone.number, per_page: 100, page
              });
              if (!data.length) break;
              allIssues.push(...data.filter(i => !i.pull_request));
              if (data.length < 100) break;
              page++;
            }

            // Fetch project item statuses via GraphQL (requires project scope — graceful fallback if unavailable)
            const statusMap = {};
            try {
              const projectToken = process.env.PROJECT_TOKEN || process.env.GITHUB_TOKEN;
              const resp = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: { Authorization: 'bearer ' + projectToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `
                  query {
                    node(id: "PVT_kwHOApg96c4Bd34f") {
                      ... on ProjectV2 {
                        items(first: 100) {
                          nodes {
                            content { ... on Issue { number } }
                            fieldValues(first: 10) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field { ... on ProjectV2SingleSelectField { name } }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `})
              });
              const projectData = await resp.json();
              if (projectData.data && projectData.data.node) {
                for (const item of projectData.data.node.items.nodes) {
                  if (!item.content) continue;
                  const statusField = item.fieldValues.nodes.find(f => f.field && f.field.name === 'Status');
                  statusMap[item.content.number] = statusField ? statusField.name : 'Todo';
                }
              }
            } catch (e) {
              console.log('Could not fetch project statuses — using label-based status only:', e.message);
            }

            const pointMap = {
              '1 point': 1, '2 points': 2, '3 points': 3, '5 points': 5,
              '8 points': 8, '13 points': 13, '21 points': 21
            };
            const getPoints = (issue) => {
              for (const l of issue.labels) {
                if (pointMap[l.name]) return pointMap[l.name];
              }
              return 0;
            };
            const hasLabel = (issue, name) => issue.labels.some(l => l.name === name);

            const WIP_STATUSES = new Set(['In Progress', 'In Review']);

            let totalPts = 0, closedPts = 0, openPts = 0, wipPts = 0;
            let totalIssues = 0, closedIssues = 0;
            const assigneeMap = {};
            const burnByDate = {};
            const sizeBuckets = { 1: { open:0, closed:0 }, 2: { open:0, closed:0 }, 3: { open:0, closed:0 }, 5: { open:0, closed:0 }, 8: { open:0, closed:0 }, 13: { open:0, closed:0 }, 21: { open:0, closed:0 } };
            const sprintStart = new Date(milestone.created_at);
            const scopeCreep = [];
            const statusCounts = { Todo: 0, Ready: 0, 'In Progress': 0, 'In Review': 0, Done: 0 };

            for (const issue of allIssues) {
              const pts = getPoints(issue);
              const isClosed = issue.state === 'closed';
              const status = isClosed ? 'Done' : (statusMap[issue.number] || 'Todo');
              totalPts += pts;
              totalIssues++;
              statusCounts[status] = (statusCounts[status] || 0) + 1;

              if (new Date(issue.created_at) > sprintStart) scopeCreep.push(issue);

              if (isClosed) {
                closedPts += pts;
                closedIssues++;
                if (issue.closed_at) {
                  const d = issue.closed_at.slice(0, 10);
                  burnByDate[d] = (burnByDate[d] || 0) + pts;
                }
              } else {
                openPts += pts;
                if (WIP_STATUSES.has(status)) wipPts += pts;
              }

              if (sizeBuckets[pts]) {
                if (isClosed) sizeBuckets[pts].closed++;
                else sizeBuckets[pts].open++;
              }

              const assignees = issue.assignees.length ? issue.assignees : [{ login: 'unassigned' }];
              for (const a of assignees) {
                if (!assigneeMap[a.login]) assigneeMap[a.login] = {
                  open: 0, closed: 0, openIssues: [], closedIssues: [],
                  byStatus: { Todo: 0, Ready: 0, 'In Progress': 0, 'In Review': 0, Done: 0 }
                };
                if (isClosed) {
                  assigneeMap[a.login].closed += pts;
                  assigneeMap[a.login].closedIssues.push('#' + issue.number);
                } else {
                  assigneeMap[a.login].open += pts;
                  assigneeMap[a.login].openIssues.push('#' + issue.number + ' [' + status + '] (' + pts + 'pts)');
                }
                assigneeMap[a.login].byStatus[status] = (assigneeMap[a.login].byStatus[status] || 0) + pts;
              }
            }

            // Dates & velocity
            const now = new Date();
            const sprintEnd = milestone.due_on ? new Date(milestone.due_on) : null;
            const msPerDay = 1000 * 60 * 60 * 24;
            const daysElapsed = Math.max(1, Math.round((now - sprintStart) / msPerDay));
            const daysTotal = sprintEnd ? Math.round((sprintEnd - sprintStart) / msPerDay) : null;
            const daysRemaining = sprintEnd ? Math.max(0, Math.round((sprintEnd - now) / msPerDay)) : null;
            let workingDaysRemaining = 0;
            if (sprintEnd) {
              for (let d = new Date(now); d <= sprintEnd; d.setDate(d.getDate() + 1)) {
                const dow = d.getDay();
                if (dow !== 0 && dow !== 6) workingDaysRemaining++;
              }
            }

            const burnRate = closedPts > 0 ? Math.round((closedPts / daysElapsed) * 10) / 10 : 0;
            let projectedFinish = 'N/A';
            let onTrackNote = '';
            if (burnRate > 0 && openPts > 0) {
              const daysNeeded = Math.ceil(openPts / burnRate);
              const projDate = new Date(now.getTime() + daysNeeded * msPerDay);
              projectedFinish = projDate.toISOString().slice(0, 10);
              if (sprintEnd) onTrackNote = projDate <= sprintEnd ? ' (on track)' : ' (at risk)';
            } else if (openPts === 0) {
              projectedFinish = 'Sprint complete';
              onTrackNote = '';
            }

            // Risk flags
            const unestimated = allIssues.filter(i => i.state === 'open' && hasLabel(i, 'needs estimation'));
            const unassigned = allIssues.filter(i => i.state === 'open' && i.assignees.length === 0);
            const bigUnstarted = allIssues.filter(i => i.state === 'open' && getPoints(i) >= 8);

            // Burndown chart — 3 lines: ideal, actual, optimistic (actual minus WIP)
            const days = [];
            const chartEnd = sprintEnd || now;
            for (let d = new Date(sprintStart); d <= chartEnd; d.setDate(d.getDate() + 1)) {
              days.push(d.toISOString().slice(0, 10));
            }
            const idealStep = days.length > 1 ? totalPts / (days.length - 1) : 0;
            const idealLine = days.map((_, i) => Math.max(0, Math.round((totalPts - idealStep * i) * 10) / 10));
            let rem = totalPts;
            const actualLine = days.map(day => {
              rem -= (burnByDate[day] || 0);
              return rem;
            });
            // Optimistic: today's actual minus all WIP points (if WIP cleared now)
            const todayStr = now.toISOString().slice(0, 10);
            const optimisticLine = days.map(day => {
              const actual = actualLine[days.indexOf(day)];
              return day >= todayStr ? Math.max(0, actual - wipPts) : actual;
            });

            const smpl = Math.max(1, Math.floor(days.length / 8));
            const idx = days.map((_, i) => i).filter(i => i % smpl === 0 || i === days.length - 1);
            const xLabels = idx.map(i => '"' + days[i].slice(5) + '"').join(', ');
            const idealSampled = idx.map(i => idealLine[i]).join(', ');
            const actualSampled = idx.map(i => actualLine[i]).join(', ');
            const optimisticSampled = idx.map(i => optimisticLine[i]).join(', ');

            // Progress bar
            const pct = totalPts ? Math.round((closedPts / totalPts) * 100) : 0;
            const filled = Math.round(pct / 5);
            const progressBar = '[' + '='.repeat(filled) + '-'.repeat(20 - filled) + '] ' + pct + '%';
            const due = sprintEnd ? sprintEnd.toISOString().slice(0, 10) : 'No due date';

            // Contributor chart
            const contribEntries = Object.entries(assigneeMap)
              .sort((a, b) => (b[1].open + b[1].closed) - (a[1].open + a[1].closed));
            const contribLabels = contribEntries.map(([login]) => '"' + login + '"').join(', ');
            const contribClosed = contribEntries.map(([, d]) => d.closed).join(', ');
            const contribOpen = contribEntries.map(([, d]) => d.open).join(', ');
            const contribMax = contribEntries.reduce((m, [, d]) => Math.max(m, d.open + d.closed), 0) || 1;

            // Load analysis
            const loadRows = contribEntries.map(([login, d]) => {
              const total = d.open + d.closed;
              const deliveryRate = total > 0 ? Math.round((d.closed / total) * 100) : 0;
              const avgPtsPerIssue = (d.openIssues.length + d.closedIssues.length) > 0
                ? Math.round((total / (d.openIssues.length + d.closedIssues.length)) * 10) / 10
                : 0;
              const wip = d.byStatus['In Progress'] + d.byStatus['In Review'];
              return '| @' + login + ' | ' + total + ' | ' + d.closed + ' | ' + d.open + ' | ' + wip + ' | ' + deliveryRate + '% | ' + avgPtsPerIssue + ' |';
            }).join('\n');

            // Assignee detail rows
            const assigneeRows = contribEntries.map(([login, d]) => {
              const openStr = d.openIssues.length ? d.openIssues.join(', ') : '—';
              const closedStr = d.closedIssues.length ? d.closedIssues.join(', ') : '—';
              return '| @' + login + ' | ' + d.closed + ' | ' + d.open + ' | ' + (d.open + d.closed) + ' | ' + closedStr + ' | ' + openStr + ' |';
            }).join('\n');

            // Size rows
            const sizeRows = Object.entries(sizeBuckets)
              .filter(([, v]) => v.open + v.closed > 0)
              .map(([p, v]) => '| ' + p + ' | ' + v.closed + ' | ' + v.open + ' | ' + (v.open + v.closed) + ' |')
              .join('\n');

            // Scope creep
            const scopeCreepList = scopeCreep.length
              ? scopeCreep.map(i => '- #' + i.number + ' — ' + i.title + ' (' + getPoints(i) + ' pts, added ' + i.created_at.slice(0, 10) + ')').join('\n')
              : 'None';

            // Issue lists with status
            const statusBadge = (issue) => {
              const s = issue.state === 'closed' ? 'Done' : (statusMap[issue.number] || 'Todo');
              return '[' + s + ']';
            };
            const closedList = allIssues
              .filter(i => i.state === 'closed')
              .map(i => '- [x] #' + i.number + ' ' + statusBadge(i) + ' ' + i.title + ' (' + getPoints(i) + ' pts)')
              .join('\n') || 'Nothing closed yet';
            const openList = allIssues
              .filter(i => i.state === 'open')
              .map(i => '- [ ] #' + i.number + ' ' + statusBadge(i) + ' ' + i.title + ' (' + getPoints(i) + ' pts)')
              .join('\n') || 'None — sprint complete';

            // Risk section
            const riskLines = [];
            if (unestimated.length) riskLines.push('| Unestimated issues | ' + unestimated.map(i => '#' + i.number).join(', ') + ' |');
            if (unassigned.length) riskLines.push('| Unassigned issues | ' + unassigned.map(i => '#' + i.number).join(', ') + ' |');
            if (bigUnstarted.length) riskLines.push('| Large open issues (8+ pts) | ' + bigUnstarted.map(i => '#' + i.number + ' (' + getPoints(i) + 'pts)').join(', ') + ' |');
            const riskSection = riskLines.length
              ? '| Risk | Issues |\n|------|--------|\n' + riskLines.join('\n')
              : 'No risk signals detected';

            const lines = [
              '## ' + sprint + ' — Sprint Report',
              '',
              '**Due:** ' + due + ' | **Days elapsed:** ' + daysElapsed + (daysTotal ? ' / ' + daysTotal : '') + ' | **Calendar days remaining:** ' + (daysRemaining !== null ? daysRemaining : 'N/A') + ' | **Working days remaining:** ' + workingDaysRemaining,
              '',
              '**Progress:** `' + progressBar + '`',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              '| Total issues | ' + totalIssues + ' |',
              '| Done | ' + statusCounts['Done'] + ' |',
              '| In Review | ' + (statusCounts['In Review'] || 0) + ' |',
              '| In Progress | ' + (statusCounts['In Progress'] || 0) + ' |',
              '| Ready | ' + (statusCounts['Ready'] || 0) + ' |',
              '| Todo | ' + (statusCounts['Todo'] || 0) + ' |',
              '| Total points | ' + totalPts + ' |',
              '| Points burned | ' + closedPts + ' |',
              '| Points in WIP | ' + wipPts + ' |',
              '| Points remaining | ' + openPts + ' |',
              '| Burn rate | ' + burnRate + ' pts/day |',
              '| Projected finish | ' + projectedFinish + onTrackNote + ' |',
              '',
              '---',
              '',
              '## Risk Signals',
              '',
              riskSection,
              '',
              '---',
              '',
              '## Burndown Chart',
              '',
              '```mermaid',
              'xychart-beta',
              '  title "' + sprint + ' Burndown"',
              '  x-axis [' + xLabels + ']',
              '  y-axis "Story Points" 0 --> ' + totalPts,
              '  line [' + idealSampled + ']',
              '  line [' + actualSampled + ']',
              '  line [' + optimisticSampled + ']',
              '```',
              '> Line 1 (blue) = ideal | Line 2 (orange) = actual | Line 3 (green) = optimistic (actual minus all In Progress + In Review points)',
              '',
              '---',
              '',
              '## Load Analysis',
              '',
              '| Assignee | Total pts | Closed pts | Open pts | WIP pts | Delivery rate | Avg pts/issue |',
              '|----------|-----------|-----------|---------|---------|--------------|---------------|',
              loadRows,
              '',
              '---',
              '',
              '## Contributor Chart',
              '',
              '```mermaid',
              'xychart-beta',
              '  title "Story Points by Contributor"',
              '  x-axis [' + contribLabels + ']',
              '  y-axis "Story Points" 0 --> ' + contribMax,
              '  bar [' + contribClosed + ']',
              '  bar [' + contribOpen + ']',
              '```',
              '> Blue = closed pts | Orange = open pts | Combined height = total poker points assigned',
              '',
              '---',
              '',
              '## Contributor Breakdown',
              '',
              '| Assignee | Closed pts | Open pts | Total | Closed issues | Open issues |',
              '|----------|-----------|---------|-------|---------------|-------------|',
              assigneeRows,
              '',
              '---',
              '',
              '## Points by Issue Size',
              '',
              '| Size (pts) | Closed | Open | Total |',
              '|-----------|--------|------|-------|',
              sizeRows,
              '',
              '---',
              '',
              '## Scope Creep',
              '',
              scopeCreepList,
              '',
              '---',
              '',
              '## Completed Issues',
              '',
              closedList,
              '',
              '---',
              '',
              '## Remaining Work',
              '',
              openList,
              '',
              '---',
              '> Generated by Sprint Report workflow'
            ];

            const report = lines.join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber, body: report
            });

            const reportTitle = sprint + ' Report — ' + new Date().toISOString().slice(0, 10);
            await github.rest.issues.update({
              owner, repo, issue_number: issueNumber,
              title: reportTitle,
              state: 'closed'
            });
